<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロジェクト投稿</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>プロジェクト投稿</h1>

  <nav>
    <a href="view.html">プロジェクト一覧</a>
  </nav>

  <form id="projectForm">

    <label>
      プロジェクト名
    </label>

    <input
      type="text"
      id="title"
      required
    >

    <label>
      内容
    </label>

    <textarea
      id="description"
      rows="10"
      required
    ></textarea>

    <button type="submit">
      投稿
    </button>

  </form>

  <script src="js/post.js"></script>

</body>
</html>
